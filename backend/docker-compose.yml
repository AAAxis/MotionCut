version: '3.8'

services:
  api:
    build: .
    ports:
      - "3001:3001"
    env_file: .env
    volumes:
      - ./output:/app/output
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: creator_ai
      POSTGRES_USER: creator
      POSTGRES_PASSWORD: ${DB_PASSWORD:-CreatorAI2026!}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped

volumes:
  pgdata:
