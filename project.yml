name: CreatorAI
options:
  bundleIdPrefix: com.theholylabs
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "3.1"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: LJPXXSNQZ9

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: "5.0.0"
  AppsFlyerLib:
    url: https://github.com/AppsFlyerSDK/AppsFlyerFramework-Dynamic.git
    from: "6.15.0"
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS.git
    from: "8.0.0"

targets:
  # ── iOS Target ──────────────────────────────────────────────────────
  CreatorAI:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: CreatorAI
    resources:
      - path: CreatorAI/Resources/Assets.xcassets
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.theholylabs.creator
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "CreatorAI needs access to your photo library to save and share videos."
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "CreatorAI needs permission to save videos to your gallery."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "CreatorAI needs microphone access for recording."
    dependencies:
      - package: Supabase
      - package: RevenueCat
        product: RevenueCat
      - package: RevenueCat
        product: RevenueCatUI
      - package: AppsFlyerLib
        product: AppsFlyerLib-Dynamic
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseMessaging
      - package: GoogleSignIn

  # ── macOS Target ────────────────────────────────────────────────────
  CreatorAI-macOS:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: CreatorAI
        excludes:
          - Services/AppsFlyerService.swift
          - Services/FCMService.swift
    resources:
      - path: CreatorAI/Resources/Assets.xcassets
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.theholylabs.creator
        PRODUCT_NAME: CreatorAI
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "CreatorAI needs microphone access for voiceover recording."
        INFOPLIST_KEY_NSCameraUsageDescription: "CreatorAI needs camera access to record videos."
    entitlements:
      path: CreatorAI/Resources/CreatorAI_macOS.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.device.audio-input: true
        com.apple.security.device.camera: true
        com.apple.developer.applesignin:
          - Default
    dependencies:
      - package: Supabase
      - package: RevenueCat
        product: RevenueCat
      - package: RevenueCat
        product: RevenueCatUI
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAuth
